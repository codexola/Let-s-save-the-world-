services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: medcare
      POSTGRES_PASSWORD: medcare
      POSTGRES_DB: medcare
    ports:
      - "5432:5432"
    volumes:
      - medcare_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Optional later: OpenSearch, MinIO (S3), Kafka
  # opensearch:
  #   image: opensearchproject/opensearch:2
  # minio:
  #   image: minio/minio

volumes:
  medcare_pg:
